{% extends 'base.html' %}
{% load static %}

{% block title %}Регистрация{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-card">
    <h2>Регистрация</h2>
    <form method="post">
        {% csrf_token %}

        {{ form.non_field_errors }}
        {{ form.as_p }}

        <button type="submit" class="black-button" style="width:100%; margin-top:10px;">Зарегистрироваться</button>
    </form>
    <p class="auth-link" style="text-align: center; margin-top: 16px;">
    Уже есть аккаунт? <a href="{% url 'users:login' %}">Войти</a></p>
</div>
{% endblock %}
